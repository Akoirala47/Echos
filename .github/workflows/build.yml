name: Build DMG

on:
  push:
    tags:
      - "v*"          # trigger on version tags e.g. v1.0.0, v1.2.3
  workflow_dispatch:  # allow manual runs from the Actions tab

jobs:
  build:
    name: Build Scout.dmg (macOS Apple Silicon)
    runs-on: macos-14        # GitHub's M1 runner

    steps:
      # ---------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ---------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      # ---------------------------------------------------------------
      # Use Homebrew create-dmg (create-dmg/create-dmg), NOT the npm
      # package (sindresorhus/create-dmg) — they are different tools with
      # different CLIs.  The Homebrew version supports --background,
      # --window-size, --icon, --app-drop-link, etc.
      - name: Install create-dmg (Homebrew)
        run: brew install create-dmg

      # ---------------------------------------------------------------
      - name: Generate assets (icon, DMG background)
        run: python3 assets/create_assets.py

      # ---------------------------------------------------------------
      - name: Build Scout.app and Scout.dmg
        run: |
          chmod +x build/build.sh
          ./build/build.sh

      # ---------------------------------------------------------------
      - name: Verify DMG was created
        run: |
          ls -lh dist/Scout-*.dmg
          echo "DMG_PATH=$(ls dist/Scout-*.dmg)" >> "$GITHUB_ENV"

      # ---------------------------------------------------------------
      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scout-dmg
          path: dist/Scout-*.dmg
          retention-days: 30

      # ---------------------------------------------------------------
      - name: Upload DMG as GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Scout-*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
