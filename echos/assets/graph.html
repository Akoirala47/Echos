<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echos Brain View</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ede4; }

#canvas-container { width: 100%; height: 100%; }
#canvas-container canvas { display: block; }

/* ── Floating overlay toolbar ────────────────────────────────────────────── */
#toolbar {
  position: fixed;
  top: 12px;
  left: 12px;
  right: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 100;
  pointer-events: none;
}
#toolbar > * { pointer-events: auto; }

#back-btn {
  width: 32px; height: 32px;
  background: rgba(251,250,246,0.90);
  border: 1px solid #dcdacf;
  border-radius: 6px;
  color: #76746b;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 120ms, color 120ms;
  backdrop-filter: blur(6px);
}
#back-btn:hover { background: #fbfaf6; color: #1d1c19; }

#vault-label {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: #76746b;
  letter-spacing: 0.3px;
  flex: 1;
}

#search-wrap {
  position: relative;
}
#search-icon {
  position: absolute;
  left: 9px; top: 50%;
  transform: translateY(-50%);
  color: #76746b;
  font-size: 13px;
  pointer-events: none;
}
#search {
  width: 200px; height: 32px;
  padding: 0 10px 0 30px;
  background: rgba(251,250,246,0.90);
  border: 1px solid #dcdacf;
  border-radius: 6px;
  color: #1d1c19;
  font-size: 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  outline: none;
  backdrop-filter: blur(6px);
  transition: border-color 120ms;
}
#search::placeholder { color: #a09e93; }
#search:focus { border-color: rgba(194,65,12,0.5); }

/* ── Node count badge ────────────────────────────────────────────────────── */
#stats {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  font-size: 11px;
  color: #a09e93;
}

/* ── Tooltip ─────────────────────────────────────────────────────────────── */
#tooltip {
  position: fixed;
  background: rgba(251,250,246,0.97);
  border: 1px solid #dcdacf;
  border-radius: 7px;
  padding: 8px 12px;
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
  font-size: 12px;
  color: #1d1c19;
  max-width: 240px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 120ms;
  z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  line-height: 1.5;
}
#tooltip.visible { opacity: 1; }
.tip-title { font-weight: 600; font-size: 12.5px; margin-bottom: 3px; }
.tip-fp { color: #76746b; font-size: 10.5px; word-break: break-word; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="toolbar">
  <button id="back-btn" title="Back">←</button>
  <span id="vault-label"></span>
  <span id="stats"></span>
  <div id="search-wrap">
    <span id="search-icon">⌕</span>
    <input id="search" type="text" placeholder="Search notes…" autocomplete="off" spellcheck="false">
  </div>
</div>

<div id="tooltip"></div>

<script src="qrc:///qtwebchannel/qwebchannel.js"></script>
<script src="vendor/d3.min.js"></script>
<script src="vendor/pixi.min.js"></script>
<script>
'use strict';

// ── Theme ─────────────────────────────────────────────────────────────────────
const BG          = 0xf0ede4;   // CANVAS_BG — warm parchment
const ACCENT      = 0xc2410c;
const BORDER      = 0xdcdacf;
const NODE_DIM    = 0xd0cdc4;   // dimmed node colour on light bg
const EDGE_ALPHA  = 0.55;
const EDGE_STRONG = 0xc2410c;
const EDGE_WEAK   = 0xdcdacf;   // BORDER — subtle on parchment

const DOMAIN_PALETTE = [
  0xc2410c, 0x1c8b4a, 0x1d4ed8, 0xbe185d, 0xb45309, 0x7c3aed,
];

function hexToPixi(css) {
  return parseInt(css.replace('#',''), 16);
}

// ── State ─────────────────────────────────────────────────────────────────────
let _nodes = [];
let _edges = [];
let _sim   = null;
let _app   = null;

// PIXI containers
let _edgeGfx  = null;   // single Graphics object for all edges
let _nodeLayer = null;  // Container for node sprites
let _nodeObjs = {};     // nodeId → { gfx, label }

let _transform = { x: 0, y: 0, scale: 1 };
let _dragging  = null;
let _panStart  = null;
let _searchQ   = '';

// ── QWebChannel bridge ────────────────────────────────────────────────────────
let _bridge = null;

function _initBridge() {
  if (typeof QWebChannel === 'undefined') {
    window.echosGraph = { loadGraph, filterNodes, recenter: _recenter };
    window.echosBridge = {
      onNodeClicked: p => console.log('[echos] click', p),
      onReady:       () => console.log('[echos] ready'),
      onBackClicked: () => console.log('[echos] back'),
      onSearchChanged: q => console.log('[echos] search', q),
    };
    window.echosBridge.onReady();
    return;
  }
  new QWebChannel(qt.webChannelTransport, ch => {
    _bridge = ch.objects.echosGraphBridge;
    window.echosGraph = { loadGraph, filterNodes, recenter: _recenter };
    window.echosBridge = {
      onNodeClicked:   p => _bridge.onNodeClicked(p),
      onReady:         () => _bridge.onReady(),
      onBackClicked:   () => _bridge.onBackClicked(),
      onSearchChanged: q => _bridge.onSearchChanged(q),
    };
    window.echosBridge.onReady();
  });
}

// ── PIXI bootstrap ────────────────────────────────────────────────────────────
function _initPixi() {
  const W = window.innerWidth, H = window.innerHeight;

  _app = new PIXI.Application({
    width: W, height: H,
    backgroundColor: BG,
    antialias: true,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  });
  document.getElementById('canvas-container').appendChild(_app.view);

  // World container (holds edges + nodes, gets transformed for pan/zoom)
  const world = new PIXI.Container();
  _app.stage.addChild(world);
  _app.stage._world = world;

  _edgeGfx = new PIXI.Graphics();
  world.addChild(_edgeGfx);

  _nodeLayer = new PIXI.Container();
  world.addChild(_nodeLayer);

  // Centre view
  _transform = { x: W / 2, y: H / 2, scale: 1 };
  _applyTransform();

  // Wheel → zoom
  _app.view.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.08 : 0.93;
    const rect = _app.view.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    _transform.x = mx + (_transform.x - mx) * factor;
    _transform.y = my + (_transform.y - my) * factor;
    _transform.scale *= factor;
    _transform.scale = Math.min(Math.max(_transform.scale, 0.1), 5);
    _applyTransform();
  }, { passive: false });

  // Pan
  _app.view.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const hit = _hitTest(e.clientX, e.clientY);
    if (hit) {
      _dragging = { node: hit, ox: e.clientX, oy: e.clientY };
      if (_sim) { hit.fx = hit.x; hit.fy = hit.y; _sim.alphaTarget(0.3).restart(); }
    } else {
      _panStart = { mx: e.clientX, my: e.clientY, tx: _transform.x, ty: _transform.y };
    }
  });
  window.addEventListener('mousemove', e => {
    if (_dragging) {
      const { node } = _dragging;
      const wx = (e.clientX - _transform.x) / _transform.scale;
      const wy = (e.clientY - _transform.y) / _transform.scale;
      node.fx = wx; node.fy = wy;
      if (_sim) _sim.alphaTarget(0.3).restart();
    } else if (_panStart) {
      _transform.x = _panStart.tx + (e.clientX - _panStart.mx);
      _transform.y = _panStart.ty + (e.clientY - _panStart.my);
      _applyTransform();
    } else {
      _hoverTest(e.clientX, e.clientY);
    }
  });
  window.addEventListener('mouseup', e => {
    if (_dragging) {
      _dragging.node.fx = null; _dragging.node.fy = null;
      if (_sim) _sim.alphaTarget(0);
      _dragging = null;
    }
    _panStart = null;
  });

  // Click
  _app.view.addEventListener('click', e => {
    const hit = _hitTest(e.clientX, e.clientY);
    if (hit && hit.path) window.echosBridge?.onNodeClicked(hit.path);
  });

  // Double-click → recenter
  _app.view.addEventListener('dblclick', () => _recenter(true));

  window.addEventListener('resize', _onResize);

  // Tick loop
  _app.ticker.add(_drawFrame);
}

function _applyTransform() {
  const world = _app.stage._world;
  world.position.set(_transform.x, _transform.y);
  world.scale.set(_transform.scale);
}

function _onResize() {
  _app.renderer.resize(window.innerWidth, window.innerHeight);
}

function _recenter(animate = false) {
  const W = window.innerWidth, H = window.innerHeight;
  _transform = { x: W / 2, y: H / 2, scale: 0.85 };
  _applyTransform();
}

// ── Hit testing ───────────────────────────────────────────────────────────────
const NODE_R = 6;

function _screenToWorld(sx, sy) {
  return {
    x: (sx - _transform.x) / _transform.scale,
    y: (sy - _transform.y) / _transform.scale,
  };
}

function _hitTest(sx, sy) {
  const { x, y } = _screenToWorld(sx, sy);
  for (const n of _nodes) {
    const dx = (n.x || 0) - x, dy = (n.y || 0) - y;
    if (dx*dx + dy*dy < (NODE_R * 2.5) ** 2) return n;
  }
  return null;
}

let _hoveredId = null;
function _hoverTest(sx, sy) {
  const hit = _hitTest(sx, sy);
  const tip = document.getElementById('tooltip');
  if (hit) {
    if (_hoveredId !== hit.id) {
      _hoveredId = hit.id;
      tip.innerHTML = `<div class="tip-title">${hit.label || hit.id}</div>`
        + (hit.fingerprint ? `<div class="tip-fp">${hit.fingerprint}</div>` : '');
    }
    tip.classList.add('visible');
    tip.style.left = (sx + 14) + 'px';
    tip.style.top  = (sy - tip.offsetHeight / 2) + 'px';
    _app.view.style.cursor = 'pointer';
  } else {
    _hoveredId = null;
    tip.classList.remove('visible');
    _app.view.style.cursor = 'default';
  }
}

// ── Graph load ────────────────────────────────────────────────────────────────
function loadGraph(data) {
  if (typeof data === 'string') data = JSON.parse(data);

  // Only file nodes — discard dirs
  _nodes = (data.nodes || [])
    .filter(n => n.kind !== 'dir')
    .map(n => ({
      ...n,
      x: (Math.random() - 0.5) * 400,
      y: (Math.random() - 0.5) * 400,
    }));

  _edges = (data.edges || []).filter(e => {
    const nodeIds = new Set(_nodes.map(n => n.id));
    return nodeIds.has(e.source) && nodeIds.has(e.target);
  });

  document.getElementById('stats').textContent =
    `${_nodes.length} note${_nodes.length !== 1 ? 's' : ''}`;

  _buildPixiNodes();
  _startSim();
  _recenter();
}

// ── PIXI node objects ─────────────────────────────────────────────────────────
function _buildPixiNodes() {
  // Clear old
  _nodeLayer.removeChildren();
  _nodeObjs = {};

  for (const n of _nodes) {
    const color = n.color ? hexToPixi(n.color) : DOMAIN_PALETTE[0];

    const gfx = new PIXI.Graphics();
    gfx.beginFill(color, 1);
    gfx.drawCircle(0, 0, NODE_R);
    gfx.endFill();

    const label = new PIXI.Text(
      (n.label || n.id).slice(0, 24),
      {
        fontFamily: '-apple-system, BlinkMacSystemFont, Inter, sans-serif',
        fontSize: 10,
        fill: 0xa09e93,
        resolution: 2,
      }
    );
    label.anchor.set(0.5, 0);
    label.y = NODE_R + 3;

    const container = new PIXI.Container();
    container.addChild(gfx);
    container.addChild(label);
    _nodeLayer.addChild(container);

    _nodeObjs[n.id] = { container, gfx, label };
  }
}

// ── D3-force simulation ───────────────────────────────────────────────────────
function _startSim() {
  if (_sim) _sim.stop();

  const nodeMap = {};
  _nodes.forEach(n => { nodeMap[n.id] = n; });

  const links = _edges.map(e => ({
    source: e.source,
    target: e.target,
    strength: e.strength || 0.5,
  }));

  const N = Math.max(_nodes.length, 1);

  _sim = d3.forceSimulation(_nodes)
    .force('link', d3.forceLink(links).id(d => d.id)
      .distance(120).strength(l => l.strength * 0.3))
    .force('charge', d3.forceManyBody()
      .strength(-350).distanceMin(20).distanceMax(900))
    .force('collide', d3.forceCollide(NODE_R + 14).strength(0.7).iterations(2))
    .force('x', d3.forceX(0).strength(0.02))
    .force('y', d3.forceY(0).strength(0.02))
    .velocityDecay(0.45)
    .alpha(1)
    .alphaMin(0.001);

  // Pre-tick for initial spread
  _sim.stop();
  const preTicks = Math.min(60, 20 + N * 2);
  for (let i = 0; i < preTicks; i++) _sim.tick();
  _sim.restart();
}

// ── PIXI render loop ──────────────────────────────────────────────────────────
function _drawFrame() {
  // Update node positions
  for (const n of _nodes) {
    const obj = _nodeObjs[n.id];
    if (!obj) continue;
    const x = n.x || 0, y = n.y || 0;
    obj.container.position.set(x, y);

    // Dim if search active and not matched
    const dimmed = _searchQ && !_isMatch(n);
    obj.gfx.alpha = dimmed ? 0.15 : 1;
    obj.label.alpha = dimmed ? 0.1 : (_hoveredId === n.id ? 1 : 0.7);
  }

  // Redraw edges
  _edgeGfx.clear();
  const nodePos = {};
  _nodes.forEach(n => { nodePos[n.id] = { x: n.x || 0, y: n.y || 0 }; });

  for (const e of _edges) {
    const src = nodePos[e.source?.id || e.source];
    const tgt = nodePos[e.target?.id || e.target];
    if (!src || !tgt) continue;

    const isWiki   = e.edge_type === 'wikilink';
    const isConcept = e.edge_type === 'concept';
    const strength = e.strength || 0.5;

    const color = isWiki ? EDGE_STRONG : EDGE_WEAK;
    const alpha = isWiki  ? 0.7
                : isConcept ? 0.15 + strength * 0.35
                : 0.1 + strength * 0.2;
    const width = isWiki ? 1.5 : 0.8;

    _edgeGfx.lineStyle(width, color, alpha);
    _edgeGfx.moveTo(src.x, src.y);
    _edgeGfx.lineTo(tgt.x, tgt.y);
  }
}

// ── Search ────────────────────────────────────────────────────────────────────
function _isMatch(n) {
  const q = _searchQ.toLowerCase();
  return (n.label || '').toLowerCase().includes(q)
      || (n.fingerprint || '').toLowerCase().includes(q);
}

function filterNodes(query) {
  _searchQ = (query || '').trim();
}

// ── Toolbar wiring ────────────────────────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  window.echosBridge?.onBackClicked();
});

document.getElementById('search').addEventListener('input', e => {
  filterNodes(e.target.value);
  window.echosBridge?.onSearchChanged(e.target.value);
});

// ── Vault name ────────────────────────────────────────────────────────────────
window.setVaultName = name => {
  document.getElementById('vault-label').textContent = name;
};

// ── Bootstrap ─────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  _initPixi();
  _initBridge();
});
</script>
</body>
</html>
